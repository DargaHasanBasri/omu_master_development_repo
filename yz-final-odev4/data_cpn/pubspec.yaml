name: data_cpn
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  # Core UI & icons
  cupertino_icons: ^1.0.8

  dotted_border: ^3.1.0

  # Flutter SDK (framework)
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1

  # Code generation module
  gen:
    path: module/gen

  # Router
  go_router: ^16.0.0

  # Utilities
  image_picker: ^1.1.2
  file_picker: ^10.3.8
  fl_chart: ^1.1.1
  excel: ^4.0.6
  logger: ^2.6.0

  # Linter & static analysis
  very_good_analysis: ^9.0.0

dev_dependencies:
  # Testing
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/ic_data_cpn.png"
  min_sdk_android: 21



flutter:
  uses-material-design: true
